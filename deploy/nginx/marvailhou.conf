# Configuration nginx pour Marvailhoù
# Domaine : marvailho.fairfaxdev.site
# Racine  : /app/dist (build statique Astro)
#
# Installation sur le VPS :
#   sudo cp deploy/nginx/marvailhou.conf /etc/nginx/sites-available/marvailhou
#   sudo ln -sf /etc/nginx/sites-available/marvailhou /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS :
#   sudo certbot --nginx -d marvailho.fairfaxdev.site
#   (certbot ajoutera automatiquement listen 443 ssl, ssl_certificate, etc.)

server {
    listen 80;
    listen [::]:80;
    server_name marvailho.fairfaxdev.site;

    root /app/dist;
    index index.html;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/plain
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Polices : cache long + CORS
    location ~* \.woff2$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Autres assets hashés par Astro : cache long
    location ~* \.(css|js|svg|png|jpe?g|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML : revalidation à chaque requête
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Flux et sitemap : cache court
    location = /rss.xml {
        add_header Cache-Control "public, max-age=300";
    }
    location = /sitemap-index.xml {
        add_header Cache-Control "public, max-age=300";
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
